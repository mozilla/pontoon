<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- Always force latest IE rendering engine (even in intranet) & Chrome Frame -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <title>Server Error</title>
    <meta name="description" content="Mozilla’s Localization Platform" />
    <meta name="author" content="Mozilla" />
    <meta name="color-scheme" content="only light" />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/static/img/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png" />

    <style>
      /*
       * Inline copy of pontoon/base/static/css/boilerplate.css. Kept here so
       * the 500 page renders correctly when static files are unreachable —
       * keep in sync with that file (including its Section 1 / Section 2
       * layout and the h5bp upstream version pin).
       */

      /* ==========================================================================
         SECTION 1: h5bp/main.css 3.0.0 — keep verbatim
         ========================================================================== */

      /*! HTML5 Boilerplate v9.0.1 | MIT License | https://html5boilerplate.com/ */

      /* main.css 3.0.0 | MIT License | https://github.com/h5bp/main.css#readme */

      html {
        color: #222;
        font-size: 1em;
        line-height: 1.4;
      }

      ::-moz-selection {
        background: #b3d4fc;
        text-shadow: none;
      }

      ::selection {
        background: #b3d4fc;
        text-shadow: none;
      }

      hr {
        display: block;
        height: 1px;
        border: 0;
        border-top: 1px solid #ccc;
        margin: 1em 0;
        padding: 0;
      }

      audio,
      canvas,
      iframe,
      img,
      svg,
      video {
        vertical-align: middle;
      }

      fieldset {
        border: 0;
        margin: 0;
        padding: 0;
      }

      textarea {
        resize: vertical;
      }

      .hidden,
      [hidden] {
        display: none !important;
      }

      .visually-hidden {
        border: 0;
        clip-path: inset(50%);
        height: 1px;
        margin: -1px;
        overflow: hidden;
        padding: 0;
        position: absolute;
        white-space: nowrap;
        width: 1px;
      }

      .visually-hidden.focusable:active,
      .visually-hidden.focusable:focus {
        clip-path: none;
        height: auto;
        margin: 0;
        overflow: visible;
        position: static;
        white-space: inherit;
        width: auto;
      }

      .invisible {
        visibility: hidden;
      }

      .clearfix::before,
      .clearfix::after {
        content: '';
        display: table;
      }

      .clearfix::after {
        clear: both;
      }

      /* ==========================================================================
         SECTION 2: Pontoon-specific additions and overrides
         ========================================================================== */

      html,
      body,
      div,
      span,
      object,
      iframe,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      blockquote,
      pre,
      abbr,
      address,
      cite,
      code,
      del,
      dfn,
      em,
      img,
      ins,
      kbd,
      q,
      samp,
      small,
      strong,
      sub,
      sup,
      var,
      b,
      i,
      dl,
      dt,
      dd,
      ol,
      ul,
      li,
      fieldset,
      form,
      label,
      legend,
      table,
      caption,
      tbody,
      tfoot,
      thead,
      tr,
      th,
      td,
      article,
      aside,
      canvas,
      details,
      figcaption,
      figure,
      footer,
      header,
      hgroup,
      menu,
      nav,
      section,
      summary,
      time,
      mark,
      audio,
      svg,
      video {
        margin: 0;
        padding: 0;
        border: 0;
        outline: 0;
        font-size: 100%;
        vertical-align: baseline;
        background: transparent;
      }

      article,
      aside,
      details,
      figcaption,
      figure,
      footer,
      header,
      hgroup,
      menu,
      nav,
      section {
        display: block;
      }

      nav ul {
        list-style: none;
      }

      blockquote,
      q {
        quotes: none;
      }

      blockquote::before,
      blockquote::after,
      q::before,
      q::after {
        content: '';
        content: none;
      }

      a {
        margin: 0;
        padding: 0;
        font-size: 100%;
        vertical-align: baseline;
        background: transparent;
      }

      ins {
        background-color: #ff9;
        color: #000;
        text-decoration: none;
      }

      mark {
        background-color: #ff9;
        color: #000;
        font-style: italic;
        font-weight: bold;
      }

      del {
        text-decoration: line-through;
      }

      abbr[title],
      dfn[title] {
        border-bottom: 1px dotted;
        cursor: help;
      }

      table {
        border-collapse: collapse;
        border-spacing: 0;
      }

      input,
      select {
        vertical-align: middle;
      }

      body {
        font: 13px/1.231 sans-serif;
      }

      select,
      input,
      textarea,
      button {
        font: 99% sans-serif;
      }

      pre,
      code,
      kbd,
      samp {
        font-family: monospace, sans-serif;
      }

      body,
      select,
      input,
      textarea {
        color: #444;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: bold;
      }

      a:hover,
      a:active {
        outline: none;
      }

      ul,
      ol {
        margin-left: 1.8em;
      }
      ol {
        list-style-type: decimal;
      }

      nav ul,
      nav li {
        margin: 0;
      }

      small {
        font-size: 85%;
      }
      strong,
      th {
        font-weight: bold;
      }

      td,
      td img {
        vertical-align: top;
      }

      sub {
        vertical-align: sub;
        font-size: smaller;
      }
      sup {
        vertical-align: super;
        font-size: smaller;
      }

      pre {
        padding: 15px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      input[type='radio'] {
        vertical-align: text-bottom;
      }
      input[type='checkbox'] {
        vertical-align: bottom;
      }

      label,
      input[type='button'],
      input[type='submit'],
      button {
        cursor: pointer;
      }

      button,
      input,
      select,
      textarea {
        margin: 0;
      }

      input:invalid,
      textarea:invalid {
        border-radius: 1px;
        box-shadow: 0 0 5px red;
      }

      ::selection {
        background: #ff5e99;
        color: #fff;
        text-shadow: none;
      }

      a:link {
        -webkit-tap-highlight-color: #ff5e99;
      }

      @font-face {
        font-family: 'Open Sans';
        font-style: normal;
        font-weight: 400;
        src: url('/static/fonts/OpenSans-Regular.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Open Sans';
        font-style: normal;
        font-weight: 300;
        src: url('/static/fonts/OpenSans-Light.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Open Sans';
        font-style: normal;
        font-weight: 700;
        src: url('/static/fonts/OpenSans-Bold.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Open Sans';
        font-style: italic;
        font-weight: 400;
        src: url('/static/fonts/OpenSans-Italic.woff2') format('woff2');
      }

      body,
      select,
      input,
      textarea,
      button {
        font-family:
          'Open Sans', 'Lucida Sans', 'Lucida Grande', 'Lucida Sans Unicode',
          Verdana, sans-serif;
      }

      body {
        background: #333941;
      }

      .container {
        margin: 0 auto;
        width: 980px;
      }

      header {
        background: #272a2f;
        height: 60px;
      }

      header nav {
        text-align: left;
      }

      header nav .logo {
        display: inline-block;
        float: left;
        margin: 14px 15px 0 0;
      }

      header nav .links {
        display: inline-block;
        float: left;
        padding-top: 22px;
      }

      .links li {
        list-style: none;
        display: inline-block;
        margin: 0 15px;
        font-size: 14px;
        line-height: 14px;
      }

      a:link,
      a:visited {
        color: #ebebeb;
        text-decoration: none;
        font-weight: 300;
      }

      a:hover,
      a:active {
        color: #7bc876;
        text-decoration: none;
      }

      #error {
        bottom: 0;
        display: table;
        height: 100%;
        overflow: hidden;
        position: fixed;
        text-align: center;
        width: 100%;
        z-index: -1;

        -moz-box-sizing: border-box;
        box-sizing: border-box;
      }

      .inner {
        display: table-cell;
        vertical-align: middle;
      }

      #title {
        display: inline-block;
        font-size: 108px;
        font-weight: 300;
        letter-spacing: -4px;
        line-height: 162px;
        text-align: center;
      }

      #title a {
        color: #ebebeb;
        font-weight: 700;
        line-height: 108px;
      }

      #subtitle {
        color: #7bc876;
        font-size: 32px;
        font-style: italic;
        font-weight: 300;
        padding-bottom: 2px;
        text-transform: none;
      }
    </style>
  </head>

  <body id="pontoon">
    <header>
      <div class="container">
        <nav>
          <a href="/" class="logo"
            ><img src="/static/img/logo.svg" width="26" height="32"
          /></a>

          <ul class="links">
            <li><a href="/teams">Teams</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/contributors">Contributors</a></li>
            <li><a href="/search">Search</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section id="error">
      <div class="inner">
        <h1 id="title"><a href="/">Oops!</a></h1>
        <h2 id="subtitle">Something is wrong. We're going to fix it soon.</h2>
      </div>
    </section>
  </body>
</html>
